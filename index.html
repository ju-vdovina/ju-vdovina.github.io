<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Свадебное приглашение</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #fdf6f0;
      padding: 50px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      margin: 10px 0;
      width: 90%;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Мы женимся! 💍</h1>
  <p>Будем рады видеть вас на нашей свадьбе</p>

  <form action="https://formspree.io/f/ВАШ_ID" method="POST">
    
    <input type="text" name="name" placeholder="Ваше имя" required>

    <p>Вы придёте?</p>

    <label>
      <input type="radio" name="attendance" value="Приду" required> Приду
    </label><br>

    <label>
      <input type="radio" name="attendance" value="Не приду"> Не приду
    </label><br>

    <button type="submit">Ответить</button>

  </form>
</div>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScp1LS-0mcnGw1RkJrTefkpTFpZCSSoCWZHBZEr3DOGdY5twQ/viewform?embedded=true" 
width="100%" height="600" frameborder="0">
Загрузка…
</iframe>

</body>
</html>
